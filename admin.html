<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản trị sách - Thư viện tỉnh Tây Ninh</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html#home" aria-label="Trang chủ Thư viện tỉnh Tây Ninh">
        <img class="brand-logo" src="assets/logo-thu-vien-tay-ninh.jpg" alt="Logo Thư viện tỉnh Tây Ninh">
        <span>
          <strong>Thư viện tỉnh Tây Ninh</strong>
          <small>Trang quản trị sách</small>
        </span>
      </a>
      <nav class="nav" aria-label="Điều hướng chính">
        <a href="index.html#sach">Xem website</a>
      </nav>
    </header>

    <main class="admin-page">
      <section class="admin-panel" id="loginPanel">
        <div>
          <p class="eyebrow">Quản trị</p>
          <h1>Đăng nhập để quản lý sách</h1>
          <p>Dùng tài khoản trong Supabase Authentication để thêm, sửa hoặc xóa sách.</p>
        </div>
        <form class="admin-form" id="loginForm">
          <label>
            Email
            <input name="email" type="email" required>
          </label>
          <label>
            Mật khẩu
            <input name="password" type="password" required>
          </label>
          <button class="button primary" type="submit">Đăng nhập</button>
        </form>
      </section>

      <section class="admin-panel hidden" id="editorPanel">
        <div class="admin-heading">
          <div>
            <p class="eyebrow">Database</p>
            <h1>Quản lý danh mục sách</h1>
          </div>
          <div class="admin-actions">
            <button class="button outline" id="importBooksButton" type="button">Nhập dữ liệu mẫu hiện có</button>
            <button class="button outline" id="newBookButton" type="button">Thêm sách mới</button>
          </div>
        </div>

        <div class="admin-message" id="adminMessage" role="status" aria-live="polite"></div>

        <form class="admin-form book-editor" id="bookForm">
          <input name="id" type="hidden">
          <label>
            Tên sách
            <input name="title" type="text" required>
          </label>
          <label>
            Tác giả/nguồn
            <input name="author" type="text" required>
          </label>
          <label>
            Chủ đề
            <select name="category" required>
              <option value="lich-su">Lịch sử</option>
              <option value="ho-chi-minh">Hồ Chí Minh</option>
              <option value="thieu-nhi">Thiếu nhi</option>
              <option value="ky-nang">Kỹ năng</option>
              <option value="van-hoc">Văn học</option>
            </select>
          </label>
          <label>
            Nhãn hiển thị
            <input name="label" type="text" required>
          </label>
          <label>
            Đường dẫn ảnh bìa
            <input name="cover" type="text" placeholder="assets/books/ten-file.jpg">
          </label>
          <label>
            Link đọc online
            <input name="onlineUrl" type="url" placeholder="https://...">
          </label>
          <label>
            Thứ tự
            <input name="sortOrder" type="number" min="0" value="0">
          </label>
          <label class="wide">
            Giới thiệu sách
            <textarea name="desc" rows="5" required></textarea>
          </label>
          <div class="admin-actions wide">
            <button class="button primary" type="submit">Lưu sách</button>
            <button class="button outline" id="deleteBookButton" type="button">Xóa sách</button>
          </div>
        </form>

        <div class="admin-list" id="adminBookList"></div>
      </section>
    </main>

    <script src="supabase-config.js"></script>
    <script src="supabase-api.js"></script>
    <script src="script.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
